<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>tente abrir esse site em vários dispositivos diferentes, ou simplesmente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-G.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a  reproduzir áudio em html5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Eyes - Patrick Jordan Patrikios.mp3" type="audio/mpeg">
        <source src="midia/Eyes - Patrick Jordan Patrikios.wav" type="audio/wav">
        <source src="midia/Eyes - Patrick Jordan Patrikios.ogg" type="audio.gg">
        <p>infelizmente o seu navegador nao consegue reprodzir áudio. <a href="midia/Eyes - Patrick Jordan Patrikios.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
