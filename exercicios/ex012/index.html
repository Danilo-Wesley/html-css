<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>este video esta hospedado no meu proprio servidor</p>
    <video width="560" controls poster="imagens/thum-montanha.avif" autoplay loop>
        <source src="midia/rodovia1.mov" type="video/mp4">
        <source src="midia/rodovia1.mp4" type="video/mp4">
        <source src="midia/rodovia.mp4" type="video/mp4">
        <p>seu navegador nao é compativel com esses video.</p>
    </video>
    <h1>inserindo videos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/pAIQC08lq_w?si=srUqbG8kzWa5B082" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
