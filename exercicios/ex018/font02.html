<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'natal';
            src: url(font/Heavenly\ Christmas\ -\ Personal\ Use.otf) format('opentype');
            font-weight: normal;
            font-style: normal;
            /*pod colocar mais de 1, é o recomendado.
            
            tipos de format()
            opentype (otf)
            truetype(ttf)
            embedded-opentype
            truetype-att(Apple advanced Typography)
            svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'natal', Times, serif;
            font-size: 5em;
            font-weight: 500;
        }
    </style>
</head>
<body>
<H1>Feliz Natal</H1>
<p>

</html>
