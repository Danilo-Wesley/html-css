<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{ /*box-level*/
            background-color: aliceblue;
            height: 300px;
            width: 300px;

            /* assim ou com short, mas essa ordem.
            border-width: 10px;
            border-style: solid;
            border-color: darkgray;*/

            border: 10px solid darkgrey;

            /*assim ou com short:
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/
            padding: 10px 10px 10px 10px; 
            /*se for tudo igual basta por 1 vez
            se por 2 medidas, vai 1 das alturas 1 das larguras*/
            
             /* margin: auto; centraliza*/
            
            /* assim ou com short, mas essa ordem. margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px; */

            margin: 20px auto 40px auto;

            /* assim ou com short, mas essa ordem.outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;*/

            outline: 5px dashed salmon;

        }
        a{ /*td q eu fiz no h1 (box - level, da de faz aq no inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: red;

            /*da de mudar de box pra inline e vice versa, usando
            display:block;
            */
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>paragrafos tbm sao ex de box-level, mas o <a href="#">mas os links sao exemplos de caixas inline-level</a>. Vamos ve como tudo isso funciona.</p>
</body>
</html>
